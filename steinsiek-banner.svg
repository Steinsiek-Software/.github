<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="logo-title logo-desc">
  <title id="logo-title">Steinsiek</title>
  <desc id="logo-desc">Das S und K des Monogramms bewegen sich auseinander und werden zum ersten und letzten Buchstaben der Wortmarke Steinsiek.</desc>
  <style>
    /* Easing-Naeherungen: inOutSine, outExpo, outCubic, inOutQuart, inOutCubic */
    .logo-s   { fill: none; stroke: #512da8; stroke-width: 56; stroke-linecap: round; }
    .logo-arm { fill: none; stroke: #7c4dff; stroke-width: 66; stroke-linecap: round; }

    .logo-s, .logo-arm {
      stroke-dasharray: 1;
      stroke-dashoffset: 1;
      opacity: 0;
      animation-name: draw;
      animation-fill-mode: both;
    }
    #s1 { animation-duration: .9s;  animation-timing-function: cubic-bezier(.37,0,.63,1); animation-delay: 0s;   }
    #s2 { animation-duration: .9s;  animation-timing-function: cubic-bezier(.37,0,.63,1); animation-delay: .14s; }
    #k1 { animation-duration: .65s; animation-timing-function: cubic-bezier(.33,1,.68,1); animation-delay: .6s;  }
    #k2 { animation-duration: .65s; animation-timing-function: cubic-bezier(.33,1,.68,1); animation-delay: .7s;  }
    @keyframes draw {
      0%   { stroke-dashoffset: 1; opacity: 0; }
      2%   { opacity: 1; }
      100% { stroke-dashoffset: 0; opacity: 1; }
    }

    #k-stem {
      transform-box: fill-box;
      transform-origin: center;
      animation: stem-in .7s cubic-bezier(.16,1,.3,1) .33s both;
    }
    @keyframes stem-in {
      from { opacity: 0; transform: scaleY(.02); }
      to   { opacity: 1; transform: scaleY(1); }
    }

    #s-motion { animation: move-s 1s cubic-bezier(.76,0,.24,1) 1.45s both; }
    #k-motion { animation: move-k 1s cubic-bezier(.76,0,.24,1) 1.45s both; }
    @keyframes move-s {
      from { transform: translate(342.625px, 2.5px) scale(.75); }
      to   { transform: translate(35.79px, 24.03px) scale(.58); }
    }
    @keyframes move-k {
      from { transform: translate(342.625px, 2.5px) scale(.75); }
      to   { transform: translate(545.1px, 8.65px) scale(.65); }
    }

    #middle-motion { animation: middle-in .52s cubic-bezier(.33,1,.68,1) 1.74s both; }
    @keyframes middle-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #middle-clip-rect {
      transform-origin: 453px 161px;
      animation: wipe .76s cubic-bezier(.65,0,.35,1) 1.69s both;
    }
    @keyframes wipe {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: .01ms !important; animation-delay: 0s !important; }
    }
  </style>
  <defs>
    <linearGradient id="word-gradient" x1="190" y1="0" x2="716" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#512da8"/><stop offset="1" stop-color="#7c4dff"/>
    </linearGradient>
    <clipPath id="middle-clip"><rect id="middle-clip-rect" x="188" y="78" width="530" height="166" rx="18"/></clipPath>
  </defs>
  <g id="s-motion" aria-hidden="true">
    <path id="s1" class="logo-s" pathLength="1" d="M 224 196 A 60 60 0 1 0 164 256"/>
    <path id="s2" class="logo-s" pathLength="1" d="M 224 196 A 60 60 0 1 0 164 256" transform="rotate(180 164 256)"/>
  </g>
  <g id="k-motion" aria-hidden="true">
    <rect id="k-stem" x="286" y="132" width="66" height="248" rx="33" fill="#512da8"/>
    <path id="k1" class="logo-arm" pathLength="1" d="M330 256 L414 158"/>
    <path id="k2" class="logo-arm" pathLength="1" d="M330 256 L414 354"/>
  </g>
  <g id="middle-motion" clip-path="url(#middle-clip)" aria-hidden="true">
